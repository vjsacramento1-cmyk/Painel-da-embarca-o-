<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#f1f5f9;color:#1e293b;font-family:'Segoe UI',Arial,sans-serif;min-height:100dvh}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer}
#app{display:flex;flex-direction:column;min-height:100dvh}
#hdr{background:linear-gradient(135deg,#1e40af,#1d4ed8);padding:max(env(safe-area-inset-top),14px) 16px 0;flex-shrink:0;box-shadow:0 2px 8px rgba(30,64,175,.3)}
#hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:3px}
#hdr-title{font-size:17px;font-weight:700;color:#fff;flex:1}
#hdr-sub{font-size:10px;color:#bfdbfe;margin-bottom:10px}
#tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
#tabs button{background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 13px;font-size:11px;color:#93c5fd;white-space:nowrap;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px}
#tabs button.on{color:#fff;border-bottom-color:#fff;font-weight:700}
#tabs button .em{font-size:16px}
#content{flex:1;padding:14px 12px;max-width:900px;width:100%;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ct{font-weight:700;font-size:15px;color:#1e293b}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;padding:8px 13px;font-size:12px;font-weight:600;white-space:nowrap}
.bb{background:#1e40af;color:#fff}.bg{background:#065f46;color:#fff}.ba{background:#92400e;color:#fff}
.bp{background:#5b21b6;color:#fff}.bh{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}.bo{background:#7c2d12;color:#fff}
.inp{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 11px;color:#1e293b;font-size:16px;outline:none}
.inp:focus{border-color:#1e40af;background:#fff}
@media(min-width:480px){.inp{font-size:13px}}
.fb{background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #e2e8f0}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.fa{display:flex;gap:8px;margin-top:8px}
.lbl{font-size:10px;color:#64748b;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.bdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-red{background:#fee2e2;color:#b91c1c}.b-amber{background:#fef3c7;color:#92400e}.b-green{background:#d1fae5;color:#065f46}
.b-blue{background:#dbeafe;color:#1e40af}.b-purple{background:#ede9fe;color:#5b21b6}.b-gray{background:#f1f5f9;color:#475569}
.b-teal{background:#ccfbf1;color:#0f766e}
.flt{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.fb2{background:#f1f5f9;color:#64748b;border:1.5px solid #e2e8f0;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:500}
.fb2.on{background:#1e40af;color:#fff;border-color:#1e40af}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.kpi{background:#f8fafc;border-radius:12px;padding:10px 4px;text-align:center;border:1.5px solid #e2e8f0}
.kv{font-size:22px;font-weight:800}.kl{font-size:9px;color:#64748b;margin-top:2px;font-weight:500}
.alert-box{border-radius:12px;padding:14px;margin-bottom:14px;border:1.5px solid}
.alert-red{background:#fff1f2;border-color:#fecdd3}.alert-amber{background:#fffbeb;border-color:#fde68a}
.alert-title{font-size:12px;font-weight:700;margin-bottom:8px}
.alert-item{font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:8px}
.alert-item:last-child{border-bottom:none}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.week-day{border-radius:8px;padding:6px 4px;text-align:center;border:1.5px solid #e2e8f0;background:#f8fafc;min-height:70px}
.week-day.today{border-color:#1e40af;background:#eff6ff}.week-day.has-overdue{border-color:#fca5a5;background:#fff1f2}
.week-day-name{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:3px}
.week-day-num{font-size:14px;font-weight:800;color:#1e293b;margin-bottom:4px}
.week-day.today .week-day-num{color:#1e40af}
.week-dot{width:7px;height:7px;border-radius:50%;margin:1px auto}
.li{border-radius:10px;background:#fff;border:1.5px solid #e2e8f0;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.li.ov{background:#fff1f2;border-color:#fca5a5}.li.dn{opacity:.55}
.ir{display:flex;align-items:flex-start;gap:10px;padding:11px 12px}
.ib{flex:1;min-width:0}.it{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.it.dt{text-decoration:line-through;color:#94a3b8}.im{font-size:11px;color:#64748b;margin-top:2px}
.itg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.ia{display:flex;gap:4px;flex-shrink:0}
.ib2{background:none;border:none;color:#94a3b8;padding:2px;font-size:15px;line-height:1;flex-shrink:0}
.ep{border-top:1.5px solid #f1f5f9;padding:10px 12px 12px}
.ph-lbs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ph-lb{display:inline-flex;align-items:center;gap:5px;cursor:pointer;border-radius:8px;padding:7px 12px;font-size:12px;border:1.5px solid;font-weight:500;background:none}
.ph-gal{background:#f0fdf4;color:#065f46;border-color:#86efac}
.ph-cam{background:#eef2ff;color:#3730a3;border-color:#a5b4fc}
.ph-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.ph-th{position:relative;width:72px;height:72px}
.ph-th img{width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer;border:1.5px solid #e2e8f0;display:block}
.ph-rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:#ef4444;border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center}
#lb.on{display:flex}
#lb img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:8px}
#lb-x{position:absolute;top:16px;right:16px;background:#475569;border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer}
.rl-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f8fafc;border-radius:8px;border:1.5px solid #e2e8f0;margin-bottom:5px}
.rl-row input[type=checkbox]{width:16px;height:16px;accent-color:#1e40af;cursor:pointer;flex-shrink:0}
.empty{color:#94a3b8;font-size:13px;text-align:center;padding:20px 0}
/* Modal de edição */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center}
#modal-overlay.on{display:flex}
#modal-box{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
#modal-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
#modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;padding:0}
/* Badges de prazo coloridos */
.due-today{background:#fee2e2;color:#b91c1c;font-weight:700;border-radius:6px;padding:2px 8px;font-size:11px}
.due-soon{background:#fef3c7;color:#92400e;font-weight:700;border-radius:6px;padding:2px 8px;font-size:11px}
.due-ok{background:#d1fae5;color:#065f46;font-weight:700;border-radius:6px;padding:2px 8px;font-size:11px}
.due-late{background:#fce7f3;color:#9d174d;font-weight:700;border-radius:6px;padding:2px 8px;font-size:11px}
/* Botão arquivar */
.btn-arch{background:#f0fdf4;color:#065f46;border:1.5px solid #86efac;border-radius:8px;padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
#bkp-panel{display:none;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:10px}
#bkp-panel.on{display:block}
#login{display:flex;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:24px}
.lcard{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.linp{width:100%;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:14px;color:#1e293b;font-size:20px;text-align:center;letter-spacing:6px;margin-bottom:8px;outline:none}
.linp:focus{border-color:#1e40af}.linp.err{border-color:#ef4444}
.lerr{color:#be123c;font-size:13px;margin-bottom:10px;font-weight:500}
.lbtn{width:100%;background:linear-gradient(135deg,#1e40af,#1d4ed8);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:3px;background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600}
.tag-rm{background:none;border:none;color:#7c3aed;cursor:pointer;padding:0;margin-left:2px;font-size:11px;opacity:.7;line-height:1}
.tag-rm:hover{opacity:1}
.tag-inp-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:6px 8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;min-height:38px;cursor:text;margin-bottom:4px}
.tag-inp-wrap:focus-within{border-color:#7c3aed}
.tag-inp-wrap input{border:none;background:transparent;outline:none;font-size:13px;color:#1e293b;min-width:80px;flex:1;padding:0}

/* Pesquisa */
.sritem{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:rgba(255,255,255,.12);border-radius:8px;margin-bottom:6px;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
.sritem:hover{background:rgba(255,255,255,.2)}
.sricon{font-size:18px;flex-shrink:0;margin-top:2px}
.srtitle{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
.srsub{font-size:11px;color:#bfdbfe}
.srhit{background:rgba(251,191,36,.4);border-radius:2px;padding:0 2px}
</style>
</head>
<body>
<div id="lb"><button id="lb-x" onclick="lbClose()">&#x2715;</button><img id="lb-img" src="" alt=""/></div>
<div id="login">
  <div class="lcard">
    <div style="font-size:52px;margin-bottom:12px">&#x2693;</div>
    <div style="color:#1e293b;font-size:20px;font-weight:800;margin-bottom:4px">Painel do Imediato</div>
    <div style="color:#64748b;font-size:13px;margin-bottom:28px">Acesso restrito</div>
    <input type="password" id="pwd-inp" class="linp" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password"/>
    <div id="pwd-err" class="lerr" style="display:none">&#x26A0; Senha incorreta</div>
    <button class="lbtn" onclick="doLogin()">Entrar &#x2192;</button>
    <div style="color:#cbd5e1;font-size:10px;margin-top:16px">Sess&#xE3;o expira ao fechar o app</div>
  </div>
</div>
<div id="app" style="display:none">
  <div id="hdr">
    <div id="hdr-top">
      <span style="font-size:22px">&#x2693;</span>
      <span id="hdr-title">Painel do Imediato</span>
      <span style="font-size:11px;color:#bfdbfe;display:flex;align-items:center;gap:8px">
        <button onclick="toggleSearch()" style="background:none;border:none;font-size:18px;opacity:.9;padding:0;cursor:pointer" title="Pesquisar">&#x1F50D;</button>
        <button onclick="bkpExport()" style="background:none;border:none;font-size:16px;opacity:.8;padding:0;cursor:pointer" title="Exportar backup">&#x2B07;&#x1F4BE;</button>
        <span id="gd-status" style="font-size:10px;color:#86efac"></span>

      </span>
    </div>
    <div id="bkp-panel">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span style="font-size:12px;color:#065f46;font-weight:700">&#x1F4BE; Backup</span>
        <button class="btn bg" style="font-size:11px;padding:5px 10px" onclick="bkpExport()">&#x2B07; Exportar</button>
        <label class="btn bg" style="font-size:11px;padding:5px 10px;cursor:pointer">&#x2B06; Restaurar<input type="file" accept=".json" style="position:absolute;left:-9999px;width:1px;height:1px" onchange="bkpImport(event)"></label>

      <div id="bkp-msg" style="display:none;font-size:11px;margin-top:8px;font-weight:500"></div>
    </div>
    <div id="search-panel" style="display:none;background:#1a327a;border-radius:10px;padding:10px 12px;margin-bottom:10px">

        <span style="color:#bfdbfe;font-size:16px">&#x1F50E;</span>
        <input id="search-inp" class="inp" placeholder="Pesquisar em tarefas, compras, recados..." 
          style="flex:1;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff;font-size:14px"
          oninput="ST.searchQ=this.value;renderSearch()"
          onkeydown="if(event.key==='Escape'){toggleSearch();}"/>
        <button onclick="toggleSearch()" style="background:none;border:none;color:#bfdbfe;font-size:18px;cursor:pointer;padding:0;line-height:1">&#x2715;</button>
      </div>
      <div id="search-results" style="margin-top:10px;max-height:60vh;overflow-y:auto"></div>
    </div>
    <div id="hdr-sub">Dados salvos localmente neste dispositivo</div>
    <div id="tabs"></div>
  </div>
  <div id="content"></div>
</div>
<!-- Modal de edição -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div id="modal-title">Editar item <button id="modal-close" onclick="closeModal()">&#x2715;</button></div>
    <div id="modal-content"></div>
  </div>
</div>
<input type="file" id="FOTO-GAL" accept="image/*" multiple style="position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0"/>
<input type="file" id="FOTO-CAM" accept="image/*" capture="environment" style="position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0"/>
<script>
var SENHA = "imediato2024";
function doLogin(){
  var inp=document.getElementById("pwd-inp"),err=document.getElementById("pwd-err");
  if(!inp)return;
  if(inp.value===SENHA){
    sessionStorage.setItem("ok","1");
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    init();
  }else{
    inp.classList.add("err");err.style.display="block";inp.value="";
    setTimeout(function(){inp.classList.remove("err");err.style.display="none";},3000);
  }
}

function todayStr(){return new Date().toISOString().split("T")[0];}
function fmtD(iso){if(!iso)return"--";var d=new Date(iso.indexOf("T")>=0?iso:iso+"T12:00:00");return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return Date.now()+""+Math.floor(Math.random()*9999);}
function addDays(ds,n){var d=new Date(ds+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function daysDiff(ds){var d=new Date(ds+"T12:00:00"),t=new Date(todayStr()+"T12:00:00");return Math.round((d-t)/86400000);}

var AREAS=["Operacional","Seguran\u00e7a","Manuten\u00e7\u00e3o","Administrativo","Tripula\u00e7\u00e3o","Compras"];

var _svt=null;
function save(){
  clearTimeout(_svt);

    try{
      var d={tasks:ST.tasks,purchases:ST.purchases,notes:ST.notes};

        d.tasks=ST.tasks.map(function(t){return Object.assign({},t,{photos:[]});});
        d.purchases=ST.purchases.map(function(p){return Object.assign({},p,{photos:[]});});
        j=JSON.stringify(d);

    setTimeout(function(){if(sv)sv.style.display="none";if(cl)cl.style.display="inline";},2000);

}

function bkpImport(e){
  var f=e.target.files&&e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!d.tasks||!d.purchases||!d.notes)throw new Error("Formato inv\u00e1lido");
      if(!confirm("Substituir todos os dados?"))return;
      ST.tasks=d.tasks;ST.purchases=d.purchases;ST.notes=d.notes;save();render();
      bkpMsg("\u2713 Restaurado!","#065f46");
    }catch(err){bkpMsg("\u274C "+err.message,"#be123c");}
  };
  r.readAsText(f);e.target.value="";
}

var _fotoKey=null;
var _tfPhotos=[],_pfPhotos=[],_nfPhotos=[];
function handleFoto(e){
  var files=Array.prototype.slice.call(e.target.files||[]),key=_fotoKey;
  if(!key||!files.length){e.target.value="";return;}
  var isDraft=key.indexOf("draft_")===0;
  var i=0;
  function next(){
    if(i>=files.length){e.target.value="";_fotoKey=null;if(!isDraft)render();return;}
    var f=files[i++];if(!f.type.startsWith("image/")){next();return;}
    var rd=new FileReader();
    rd.onload=function(ev){fotoAdd(key,{id:uid(),name:f.name,src:ev.target.result,date:new Date().toLocaleDateString("pt-BR")});next();};
    rd.readAsDataURL(f);
  }
  next();
}
function fotoGal(key){_fotoKey=key;document.getElementById("FOTO-GAL").value="";document.getElementById("FOTO-GAL").click();}
function fotoCam(key){_fotoKey=key;document.getElementById("FOTO-CAM").value="";document.getElementById("FOTO-CAM").click();}
function fotoAdd(key,ph){
  if(key==="draft_t"){_tfPhotos.push(ph);renderDraftPhotos();return;}
  if(key==="draft_p"){_pfPhotos.push(ph);renderDraftPhotos();return;}
  if(key==="draft_n"){_nfPhotos.push(ph);renderDraftPhotos();return;}
  var pts=key.split("_"),type=pts[0],id=pts.slice(1).join("_");
  var arr=type==="t"?ST.tasks:type==="p"?ST.purchases:type==="n"?ST.notes:null;
  if(!arr)return;
  var item=arr.find(function(x){return x.id===id;});
  if(item){if(!item.photos)item.photos=[];item.photos.push(ph);save();}
}
function fotoRm(key,pid){
  if(key==="draft_t"){_tfPhotos=_tfPhotos.filter(function(p){return p.id!==pid;});renderDraftPhotos();return;}
  if(key==="draft_p"){_pfPhotos=_pfPhotos.filter(function(p){return p.id!==pid;});renderDraftPhotos();return;}
  if(key==="draft_n"){_nfPhotos=_nfPhotos.filter(function(p){return p.id!==pid;});renderDraftPhotos();return;}
  var pts=key.split("_"),type=pts[0],id=pts.slice(1).join("_");
  var arr=type==="t"?ST.tasks:type==="p"?ST.purchases:type==="n"?ST.notes:null;
  if(!arr)return;
  var item=arr.find(function(x){return x.id===id;});
  if(item){item.photos=item.photos.filter(function(p){return p.id!==pid;});save();render();}
}

function tabRel(){
  if(!ST.relTagSel)ST.relTagSel={};
  if(!ST.rel.periodStart)ST.rel.periodStart="";
  if(!ST.rel.periodEnd)ST.rel.periodEnd="";

  // Determinar quais itens exibir na lista (filtrados por período se definido)
  var ps=ST.rel.periodStart, pe=ST.rel.periodEnd;
  var hasPeriod=ps&&pe;

  var tasksVis=ST.tasks.filter(function(t){
    if(!hasPeriod)return true;
    var d=t.due||t.createdAt||"";
    return d>=ps&&d<=pe;
  });
  var purchsVis=ST.purchases.filter(function(p){
    if(!hasPeriod)return true;
    var d=p.requestDate||"";
    return d>=ps&&d<=pe;
  });
  var notesVis=ST.notes.filter(function(n){
    if(!hasPeriod)return true;
    var d=n.date||"";
    return d>=ps&&d<=pe;
  });

  // Garantir que itens visíveis estejam no mapa de seleção (default true)
  tasksVis.forEach(function(t){if(!(t.id in ST.rel.tasks))ST.rel.tasks[t.id]=true;});
  purchsVis.forEach(function(p){if(!(p.id in ST.rel.purchases))ST.rel.purchases[p.id]=true;});
  notesVis.forEach(function(n){if(!(n.id in ST.rel.notes))ST.rel.notes[n.id]=true;});

  var sT=tasksVis.filter(function(t){return ST.rel.tasks[t.id];});
  var sP=purchsVis.filter(function(p){return ST.rel.purchases[p.id];});
  var sN=notesVis.filter(function(n){return ST.rel.notes[n.id];});

  function secHdr(icon,title,cnt,total,sec,visArr){
    return "<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">"
      +"<span style=\"font-size:12px;font-weight:700;color:#1e293b\">"+icon+" "+title+" ("+cnt+"/"+total+")</span>"
      +"<div><button onclick=\"relAllArr('"+sec+"',["+visArr.map(function(x){return"'"+x.id+"'";}).join(",")+"])\" style=\"font-size:10px;color:#1e40af;background:none;border:none;cursor:pointer;font-weight:600\">Todos</button>"
      +" <button onclick=\"relNoneArr('"+sec+"',["+visArr.map(function(x){return"'"+x.id+"'";}).join(",")+"])\" style=\"font-size:10px;color:#64748b;background:none;border:none;cursor:pointer\">Nenhum</button></div></div>";
  }

  var tR=tasksVis.map(function(t){
    return "<div class=\"rl-row\"><input type=\"checkbox\""+(ST.rel.tasks[t.id]?" checked":"")+" onchange=\"relTog('tasks','"+t.id+"')\"/>"
      +"<div style=\"flex:1;min-width:0\"><span style=\"font-size:12px;color:"+(t.done?"#94a3b8":"#1e293b")+";text-decoration:"+(t.done?"line-through":"none")+";font-weight:500\">"+esc(t.title)+"</span>"
      +" <span class=\"bdg "+PBDG[t.priority]+"\">"+t.priority+"</span>"
      +" <span class=\"bdg b-gray\">"+esc(t.area)+"</span>"
      +(t.due?"<span style=\"font-size:10px;color:#64748b;margin-left:4px\">"+fmtD(t.due)+"</span>":"")
      +"</div><span class=\"bdg "+(t.done?"b-green":"b-amber")+"\">"+(t.done?"\u2713":"Pend.")+"</span></div>";
  }).join("");

  var pR=purchsVis.map(function(p){
    return "<div class=\"rl-row\"><input type=\"checkbox\""+(ST.rel.purchases[p.id]?" checked":"")+" onchange=\"relTog('purchases','"+p.id+"')\"/>"
      +"<div style=\"flex:1;min-width:0\"><span style=\"font-size:12px;color:#1e293b;font-weight:500\">"+esc(p.item)+"</span>"
      +(p.code?" <span class=\"bdg b-gray\">"+esc(p.code)+"</span>":"")
      +(p.requestDate?"<span style=\"font-size:10px;color:#64748b;margin-left:4px\">"+fmtD(p.requestDate)+"</span>":"")
      +"</div><span class=\"bdg "+PSCOL[p.status]+"\">"+esc(p.status)+"</span></div>";
  }).join("");

  var nR=notesVis.map(function(n){
    return "<div class=\"rl-row\"><input type=\"checkbox\""+(ST.rel.notes[n.id]?" checked":"")+" onchange=\"relTog('notes','"+n.id+"')\"/>"
      +"<div style=\"flex:1;min-width:0\"><span style=\"font-size:12px;color:#1e293b\">"+esc(n.text)+"</span>"
      +(n.date?"<span style=\"font-size:10px;color:#64748b;margin-left:4px\">"+fmtD(n.date)+"</span>":"")
      +"</div><span style=\"font-size:10px;color:#7c3aed;font-weight:600\">"+esc(n.ch)+"</span></div>";
  }).join("");

  // Bloco de filtro de período
  var periodBlock="<div style=\"background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:14px\">"
    +"<div style=\"font-size:11px;color:#1e40af;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px\">&#x1F4C5; Filtro por Per\u00edodo de Servi\u00e7o</div>"
    +"<div class=\"gr2\" style=\"margin-bottom:10px\">"
    +"<div><label class=\"lbl\">In\u00edcio do per\u00edodo</label><input type=\"date\" class=\"inp\" id=\"rel-ps\" value=\""+esc(ps)+"\" oninput=\"ST.rel.periodStart=this.value\"/></div>"
    +"<div><label class=\"lbl\">Fim do per\u00edodo</label><input type=\"date\" class=\"inp\" id=\"rel-pe\" value=\""+esc(pe)+"\" oninput=\"ST.rel.periodEnd=this.value\"/></div>"
    +"</div>"
    +"<div style=\"display:flex;gap:8px;flex-wrap:wrap\">"
    +"<button class=\"btn bb\" onclick=\"applyPeriodFilter()\">&#x1F50D; Filtrar per\u00edodo</button>"
    +(hasPeriod?"<button class=\"btn bh\" onclick=\"clearPeriodFilter()\">&#x2715; Limpar filtro</button>":"")
    +"</div>"
    +(hasPeriod?"<div style=\"font-size:11px;color:#1e40af;margin-top:8px;font-weight:600\">&#x2705; Exibindo itens de "+fmtD(ps)+" a "+fmtD(pe)+"</div>":"")
    +"</div>";

  return "<div class=\"card\"><div class=\"ch\"><div class=\"ct\">&#x1F4CB; Passagem de Servi\u00e7o</div><button class=\"btn bo\" onclick=\"printRel()\">&#x1F5A8; Imprimir</button></div>"
    +periodBlock
    +"<div style=\"background:#f5f3ff;border:1.5px solid #c4b5fd;border-radius:12px;padding:14px;margin-bottom:14px\">"+tabRelTags()+"</div>"
    +"<div class=\"fb\" style=\"margin-bottom:14px\"><div style=\"font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px\">Identifica\u00e7\u00e3o</div>"
    +"<div class=\"gr3\"><div><label class=\"lbl\">Embarca\u00e7\u00e3o</label><input class=\"inp\" id=\"rv\" value=\""+esc(ST.rel.vessel)+"\" placeholder=\"Nome\" oninput=\"ST.rel.vessel=this.value\"/></div>"
    +"<div><label class=\"lbl\">Oficial de servi\u00e7o</label><input class=\"inp\" id=\"ro\" value=\""+esc(ST.rel.officer)+"\" placeholder=\"Seu nome\" oninput=\"ST.rel.officer=this.value\"/></div>"
    +"<div><label class=\"lbl\">Releva</label><input class=\"inp\" id=\"rr\" value=\""+esc(ST.rel.relievedBy)+"\" placeholder=\"Quem assume\" oninput=\"ST.rel.relievedBy=this.value\"/></div></div></div>"
    +(tasksVis.length?"<div style=\"margin-bottom:14px\">"+secHdr("\u2693","Tarefas",sT.length,tasksVis.length,"tasks",tasksVis)+tR+"</div>"
      :(hasPeriod?"<div class=\"card\" style=\"margin-bottom:14px;text-align:center;color:#94a3b8;font-size:13px\">Nenhuma tarefa no per\u00edodo selecionado.</div>":""))
    +(purchsVis.length?"<div style=\"margin-bottom:14px\">"+secHdr("&#x1F6D2;","Compras",sP.length,purchsVis.length,"purchases",purchsVis)+pR+"</div>"
      :(hasPeriod?"<div class=\"card\" style=\"margin-bottom:14px;text-align:center;color:#94a3b8;font-size:13px\">Nenhuma compra no per\u00edodo selecionado.</div>":""))
    +(notesVis.length?"<div style=\"margin-bottom:14px\">"+secHdr("&#x1F4AC;","Recados",sN.length,notesVis.length,"notes",notesVis)+nR+"</div>"
      :(hasPeriod?"<div class=\"card\" style=\"margin-bottom:14px;text-align:center;color:#94a3b8;font-size:13px\">Nenhum recado no per\u00edodo selecionado.</div>":""))
    +"<div><label class=\"lbl\" style=\"margin-bottom:6px;display:block\">Observa\u00e7\u00f5es gerais</label>"
    +"<textarea class=\"inp\" rows=\"4\" placeholder=\"Observa\u00e7\u00f5es\u2026\" oninput=\"ST.rel.obs=this.value\" style=\"resize:vertical\">"+esc(ST.rel.obs)+"</textarea></div></div>";
}
function applyPeriodFilter(){
  var ps=document.getElementById("rel-ps");
  var pe=document.getElementById("rel-pe");
  if(ps)ST.rel.periodStart=ps.value;
  if(pe)ST.rel.periodEnd=pe.value;
  if(!ST.rel.periodStart||!ST.rel.periodEnd){alert("Informe as duas datas do período.");return;}
  // Resetar seleções para que a nova lista comece tudo marcado
  ST.rel.tasks={};ST.rel.purchases={};ST.rel.notes={};
  render();
}
function clearPeriodFilter(){
  ST.rel.periodStart="";ST.rel.periodEnd="";
  ST.rel.tasks={};ST.rel.purchases={};ST.rel.notes={};
  render();
}
function relTog(sec,id){ST.rel[sec][id]=!ST.rel[sec][id];render();}
function relAll(sec){var m={tasks:ST.tasks,purchases:ST.purchases,notes:ST.notes};m[sec].forEach(function(x){ST.rel[sec][x.id]=true;});render();}
function relNone(sec){ST.rel[sec]={};render();}
function relAllArr(sec,ids){ids.forEach(function(id){ST.rel[sec][id]=true;});render();}
function relNoneArr(sec,ids){ids.forEach(function(id){ST.rel[sec][id]=false;});render();}

function tabRelTags(){
  // Coletar todas as tags existentes
  var allTags=getAllTags();
  if(!allTags.length) return '<div class="empty">Nenhuma tag cadastrada ainda.</div>';
  var sel=ST.relTagSel||{};
  var chips=allTags.map(function(t){
    var on=sel[t];
    return '<button onclick="toggleRelTag(\''+esc(t)+'\')" '
      +'style="background:'+(on?'#5b21b6':'#ede9fe')+';color:'+(on?'#fff':'#5b21b6')
      +';border:1.5px solid #c4b5fd;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer">'
      +'&#x1F3F7; '+esc(t)+'</button>';
  }).join(' ');
  var selected=Object.keys(sel).filter(function(t){return sel[t];});
  return '<div style="margin-bottom:14px">'
    +'<div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Filtrar por Tags</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">'+chips+'</div>'
    +(selected.length
      ?'<div style="font-size:12px;color:#5b21b6;margin-bottom:10px">&#x1F3F7; '+selected.length+' tag(s) selecionada(s)</div>'
        +'<button class="btn bp" onclick="printRelByTag()">&#x1F4CB; Gerar Relatório por Tag</button>'
        +' <button class="btn bh" onclick="ST.relTagSel={};render()">Limpar</button>'
      :'<div style="font-size:12px;color:#94a3b8">Selecione ao menos uma tag para gerar o relatório.</div>'
    )
    +'</div>';
}

function printRelByTag(){
  var sel=ST.relTagSel||{};
  var selectedTags=Object.keys(sel).filter(function(t){return sel[t];});
  if(!selectedTags.length){alert("Selecione ao menos uma tag.");return;}

  var now=new Date();
  var ds=now.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  var ts=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

  // Coletar todos os itens com as tags selecionadas
  var tasks=[]; var purchs=[]; var notes=[];
  ST.tasks.forEach(function(t){
    if((t.tags||[]).some(function(tg){return sel[tg];}))tasks.push(t);
  });
  ST.purchases.forEach(function(p){
    if((p.tags||[]).some(function(tg){return sel[tg];}))purchs.push(p);
  });
  ST.notes.forEach(function(n){
    if((n.tags||[]).some(function(tg){return sel[tg];}))notes.push(n);

    +'<div><label>Data / Hora</label><span>'+ds+' \u00B7 '+ts+'</span></div>'
    +'<div><label>Oficial</label><span>'+o+'</span></div>'

    +'</div>';

var _tfTags=[],_pfTags=[],_nfTags=[];
function getAllTags(){
  var s={};
  ST.tasks.forEach(function(t){(t.tags||[]).forEach(function(g){s[g]=1;});});
  ST.purchases.forEach(function(p){(p.tags||[]).forEach(function(g){s[g]=1;});});
  ST.notes.forEach(function(n){(n.tags||[]).forEach(function(g){s[g]=1;});});
  return Object.keys(s).sort();
}
function tagHTML(tags,type,id){
  var chips=(tags||[]).map(function(t){
    return '<span class="tag">'+esc(t)+'<button class="tag-rm" onclick="rmItemTag(\''+type+'\',\''+esc(id)+'\',\''+esc(t)+'\')">&#x2715;</button></span>';
  }).join('');
  return '<div style="margin-bottom:6px"><div class="tag-inp-wrap" id="tw-'+esc(type)+'-'+esc(id)+'">'+chips+'<input data-taginp="itm_'+esc(type)+'_'+esc(id)+'" placeholder="+ tag" autocomplete="off" style="border:none;background:transparent;outline:none;font-size:12px;min-width:60px;flex:1"/></div></div>';
}
function tagFieldHTML(inpId,chipsId,ns,listId){
  return '<div style="margin-bottom:10px"><div class="tag-inp-wrap" id="'+chipsId+'"></div>'
    +'<datalist id="'+listId+'">'+getAllTags().map(function(t){return'<option value="'+esc(t)+'">';}).join('')+'</datalist>'
    +'<input class="inp" id="'+inpId+'" data-taginp="'+ns+'" list="'+listId+'" placeholder="Adicionar tag (Enter)" autocomplete="off" style="margin-top:4px;font-size:13px"/></div>';
}
function tfAddTag(v){if(!v||_tfTags.indexOf(v)>=0)return;_tfTags.push(v);renderTagChips("tf-tags-chips",_tfTags,"tf");}
function pfAddTag(v){if(!v||_pfTags.indexOf(v)>=0)return;_pfTags.push(v);renderTagChips("pf-tags-chips",_pfTags,"pf");}
function niAddTag(v){if(!v||_nfTags.indexOf(v)>=0)return;_nfTags.push(v);renderTagChips("ni-tags-chips",_nfTags,"ni");}
function renderTagChips(cid,arr,ns){
  var el=document.getElementById(cid);if(!el)return;
  el.innerHTML=arr.map(function(t,i){return '<span class="tag">'+esc(t)+'<button class="tag-rm" onclick="rmFormTag(\''+ns+'\','+i+')">&#x2715;</button></span>';}).join('');
}
function rmFormTag(ns,i){
  if(ns==="tf"){_tfTags.splice(i,1);renderTagChips("tf-tags-chips",_tfTags,"tf");}
  else if(ns==="pf"){_pfTags.splice(i,1);renderTagChips("pf-tags-chips",_pfTags,"pf");}
  else if(ns==="ni"){_nfTags.splice(i,1);renderTagChips("ni-tags-chips",_nfTags,"ni");}
}
function rmItemTag(type,id,tag){
  var arr=type==="task"?ST.tasks:type==="purch"?ST.purchases:ST.notes;
  var item=arr.find(function(x){return x.id===id;});
  if(item){item.tags=(item.tags||[]).filter(function(t){return t!==tag;});save();render();}
}

function dueBadge(due,done){
  if(!due)return"";
  var d=daysDiff(due);
  if(done)return'<span class="due-ok">&#x2713; '+fmtD(due)+'</span>';
  if(d<0)return'<span class="due-late">&#x26A0; ATRASO '+Math.abs(d)+'d \u00B7 '+fmtD(due)+'</span>';
  if(d===0)return'<span class="due-today">Hoje \u00B7 '+fmtD(due)+'</span>';
  if(d<=3)return'<span class="due-soon">Em '+d+'d \u00B7 '+fmtD(due)+'</span>';
  return'<span class="due-ok">'+fmtD(due)+'</span>';
}

function saveEditTask(id){
  var t=ST.tasks.find(function(x){return x.id===id;});if(!t)return;
  t.title=document.getElementById("et-t").value.trim()||t.title;
  t.area=document.getElementById("et-a").value;
  t.priority=document.getElementById("et-p").value;
  t.due=document.getElementById("et-d").value;
  var locSel=document.getElementById("et-loc");
  if(locSel){
    var locVal=locSel.value;
    if(locVal==="__outro__"){var lo=document.getElementById("et-loc-outro");locVal=lo?lo.value.trim():"";}
    t.location=locVal;
  }
  t.notes=document.getElementById("et-n").value.trim();
  t.needsEvidence=document.getElementById("et-e").checked;
  save();closeModal();render();
}

function toggleSearch(){
  var p=document.getElementById("search-panel");
  if(!p)return;
  var vis=p.style.display==="block"||p.style.display==="";
  p.style.display=vis?"none":"block";
  if(!vis){var inp=document.getElementById("search-inp");if(inp){inp.value="";ST.searchQ="";renderSearch();inp.focus();}}
}
function renderSearch(){
  var q=(ST.searchQ||"").toLowerCase().trim();
  var el=document.getElementById("search-results");if(!el)return;
  if(!q){el.innerHTML='';return;}
  function hi(s){return esc(s).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),function(m){return'<mark class="srhit">'+m+'</mark>';});}
  var res=[];
  ST.tasks.forEach(function(t){
    if((t.title+(t.notes||"")+(t.area||"")+(t.location||"")).toLowerCase().indexOf(q)>=0)
      res.push({icon:"\u2693",title:t.title,sub:t.area+(t.location?" \u00B7 \uD83D\uDCCD"+t.location:"")+" \u00B7 "+t.priority,type:"tarefa",tab:"tarefas",id:t.id});
  });
  ST.purchases.forEach(function(p){
    if((p.item+(p.notes||"")+(p.supplier||"")).toLowerCase().indexOf(q)>=0)
      res.push({icon:"&#x1F6D2;",title:p.item,sub:p.status+(p.supplier?" \u00B7 "+p.supplier:""),type:"compra",tab:"compras",id:p.id});
  });
  ST.notes.forEach(function(n){
    if((n.text+(n.ch||"")).toLowerCase().indexOf(q)>=0)
      res.push({icon:"&#x1F4AC;",title:n.text,sub:n.time+" \u00B7 "+n.ch,type:"recado",tab:"recados",id:n.id});
  });
  if(!res.length){el.innerHTML='<div class="empty" style="color:#bfdbfe">Nenhum resultado.</div>';return;}
  el.innerHTML=res.slice(0,10).map(function(r){
    return '<div class="sritem" onclick="searchGoTo(\''+r.tab+'\',\''+r.id+'\')">'
      +'<span class="sricon">'+r.icon+'</span>'
      +'<div style="flex:1;min-width:0"><div class="srtitle">'+hi(r.title)+'</div><div class="srsub">'+r.sub+'</div></div>'
      +'<span style="font-size:10px;color:#93c5fd;flex-shrink:0">Ver \u2192</span>'
      +'</div>';
  }).join('');
}
function searchGoTo(tab,id){
  // Fechar painel de busca
  var p=document.getElementById("search-panel");if(p)p.style.display="none";
  // Expandir o item
  if(tab==="tarefas")ST.exp["t"+id]=true;
  else if(tab==="compras")ST.exp["p"+id]=true;
  else if(tab==="recados")ST.exp["n"+id]=true;
  // Navegar para a aba
  ST.tab=tab;renderTabs();render();
  // Rolar até o item após render
  setTimeout(function(){
    var el=document.getElementById("item-"+id)||document.querySelector("[data-itemid='"+id+"']");
    if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
  },120);
}

function tabTags(){
  var allTags=getAllTags();
  if(!allTags.length)return'<div class="card"><div class="ct">&#x1F3F7; Tags</div><div class="empty" style="margin-top:12px">Nenhuma tag cadastrada ainda.<br>Adicione tags nas tarefas, compras ou recados.</div></div>';
  var rows=allTags.map(function(tag){
    var tc=ST.tasks.filter(function(t){return(t.tags||[]).indexOf(tag)>=0;}).length;
    var pc=ST.purchases.filter(function(p){return(p.tags||[]).indexOf(tag)>=0;}).length;
    var nc=ST.notes.filter(function(n){return(n.tags||[]).indexOf(tag)>=0;}).length;
    return '<div class="li" style="cursor:pointer" onclick="openTagModal(\''+esc(tag).replace(/'/g,"\\'")+'\')"><div class="ir"><span style="font-size:18px">&#x1F3F7;</span>'
      +'<div class="ib"><div class="it">'+esc(tag)+'</div>'
      +'<div class="im">'
      +(tc?'<span class="bdg b-blue" style="margin-right:4px">\u2693 '+tc+' tarefa'+(tc>1?'s':'')+'</span>':'')
      +(pc?'<span class="bdg b-amber" style="margin-right:4px">&#x1F6D2; '+pc+' compra'+(pc>1?'s':'')+'</span>':'')
      +(nc?'<span class="bdg b-purple">&#x1F4AC; '+nc+' recado'+(nc>1?'s':'')+'</span>':'')
      +'</div></div></div></div>';
  }).join('');
  return'<div class="card"><div class="ct" style="margin-bottom:14px">&#x1F3F7; Tags ('+allTags.length+')</div>'+rows+'</div>';
}
function openTagModal(tag){
  var ts=ST.tasks.filter(function(t){return(t.tags||[]).indexOf(tag)>=0;});
  var ps=ST.purchases.filter(function(p){return(p.tags||[]).indexOf(tag)>=0;});
  var ns=ST.notes.filter(function(n){return(n.tags||[]).indexOf(tag)>=0;});
  var html='';
  if(ts.length){
    html+='<div style="font-size:11px;font-weight:700;color:#1e40af;text-transform:uppercase;margin:10px 0 6px">\u2693 Tarefas ('+ts.length+')</div>';
    html+=ts.map(function(t){
      return '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">'
        +'<span class="bdg '+PBDG[t.priority]+'" style="margin-right:6px">'+t.priority+'</span>'
        +'<span class="bdg b-gray">'+esc(t.area)+'</span>'
        +'<div style="font-size:13px;font-weight:600;margin-top:4px;color:'+(t.done?"#94a3b8":"#1e293b")+';text-decoration:'+(t.done?"line-through":"none")+'">'+esc(t.title)+'</div>'
        +(t.location?'<div style="font-size:11px;color:#64748b">&#x1F4CD; '+esc(t.location)+'</div>':'')
        +'</div>';
    }).join('');
  }
  if(ps.length){
    html+='<div style="font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;margin:14px 0 6px">&#x1F6D2; Compras ('+ps.length+')</div>';
    html+=ps.map(function(p){
      return '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">'
        +'<span class="bdg '+PSCOL[p.status]+'" style="margin-right:6px">'+esc(p.status)+'</span>'
        +'<div style="font-size:13px;font-weight:600;margin-top:4px;color:#1e293b">'+esc(p.item)+'</div>'
        +'</div>';
    }).join('');
  }
  if(ns.length){
    html+='<div style="font-size:11px;font-weight:700;color:#7c3aed;text-transform:uppercase;margin:14px 0 6px">&#x1F4AC; Recados ('+ns.length+')</div>';
    html+=ns.map(function(n){
      return '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">'
        +'<div style="font-size:13px;color:#1e293b">'+esc(n.text)+'</div>'
        +'<div style="font-size:11px;color:#64748b">'+esc(n.time)+'</div>'
        +'</div>';
    }).join('');
  }
  if(!html)html='<div class="empty">Nenhum item encontrado.</div>';
  openModal('&#x1F3F7; '+esc(tag),'<div>'+html+'</div>');
}

function printRel(){

  var purchsVis=ST.purchases.filter(function(p){if(!ps||!pe)return true;var d=p.requestDate||"";return d>=ps&&d<=pe;});
  var notesVis=ST.notes.filter(function(n){if(!ps||!pe)return true;var d=n.date||"";return d>=ps&&d<=pe;});
  var sT=tasksVis.filter(function(t){return ST.rel.tasks[t.id];});
  var sP=purchsVis.filter(function(p){return ST.rel.purchases[p.id];});
  var sN=notesVis.filter(function(n){return ST.rel.notes[n.id];});

  var ts=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

    +'th{background:#e8edf7;color:#1e3a8a;padding:6px 8px;text-align:left;font-size:11px;border:1px solid #c8d4eb}'
    +'td{padding:6px 8px;border:1px solid #e5e7eb;vertical-align:top}'
    +'tr:nth-child(even) td{background:#f9fafb}'

    +'.meta{background:#f5f5f5;border:1px solid #ccc;border-radius:6px;padding:14px;margin-bottom:22px}'
    +'.meta label{font-size:10px;color:#666;text-transform:uppercase;display:block;margin-bottom:3px}'
    +'.meta span{font-size:13px;font-weight:700}'
    +'.footer{margin-top:50px;display:grid;grid-template-columns:1fr 1fr;gap:50px}'
    +'.sign{border-top:1px solid #333;padding-top:8px;text-align:center;font-size:11px}'
    +'@media print{.foto-sec{page-break-before:always}img{max-width:100%!important}}'
    +'.foto-sec{margin-top:24px;border-top:2px solid #1e3a8a;padding-top:14px}'

    +'.foto-item{margin-bottom:20px;padding:10px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;break-inside:avoid}'
    +'.foto-item-title{font-size:12px;font-weight:700;color:#1e293b;margin-bottom:10px}'
    +'.foto-loc{font-size:11px;font-weight:500;color:#475569;margin-left:6px}'
    +'.foto-grid{display:flex;flex-wrap:wrap;gap:10px}'
    +'.foto-th{text-align:center}'

    +'.foto-date{font-size:9px;color:#94a3b8;margin-top:3px}';

    +'<p style="text-align:center;color:#444;font-size:12px;border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:20px">Embarca\u00e7\u00e3o: <b>'+v+'</b>'+perStr+'</p>'
    +'<div class="meta" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">'

  if(sP.length){

    sP.forEach(function(p){
      h+='<tr><td><b>'+p.item+'</b>'+(p.notes?'<br><small style="color:#6b7280">'+p.notes+'</small>':'')+'</td>'
        +'<td>'+p.qty+' '+p.unit+'</td>'
        +'<td>'+(p.supplier||'--')+'</td>'
        +'<td>'+(p.requestDate?fmtD(p.requestDate):'--')+'</td>'
        +'<td>'+p.status+'</td></tr>';
    });

    if(comFotoP.length){

          +'<div class="foto-grid">'+p.photos.map(function(ph){

  if(sN.length){

          +'<div class="foto-grid">'+n.photos.map(function(ph){

          }).join('')+'</div></div>';
      });
      h+='</div>';
    }
  }
  if(ST.rel.obs){h+='<h2>Observa\u00e7\u00f5es Gerais</h2><p style="font-size:13px;padding:8px;border:1px solid #e5e7eb;border-radius:4px">'+esc(ST.rel.obs)+'</p>';}
  h+='<div class="footer">'

function tickClock(){var el=document.getElementById("clk");if(el)el.textContent=new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}
setInterval(tickClock,30000);

function init(){
  var migMap={"Solicitado":"Fazer Pedido","Cota\u00e7\u00e3o":"Aguardando Cota\u00e7\u00e3o","Pedido Enviado":"Aprovado"};
  ST.purchases.forEach(function(p){if(migMap[p.status])p.status=migMap[p.status];});
  ST.tasks.forEach(function(t){if(!t.tags)t.tags=[];});
  ST.purchases.forEach(function(p){if(!p.tags)p.tags=[];});
  ST.notes.forEach(function(n){if(!n.tags)n.tags=[];});

  // Registrar listeners que dependem do DOM
  var fGal=document.getElementById("FOTO-GAL");
  if(fGal)fGal.addEventListener("change",handleFoto);
  var fCam=document.getElementById("FOTO-CAM");
  if(fCam)fCam.addEventListener("change",handleFoto);
  var lb=document.getElementById("lb");
  if(lb)lb.addEventListener("click",function(e){if(e.target===this)lbClose();});

  // Listener global de cliques (delegação de eventos)
  document.addEventListener("click",function(e){
    var wd=e.target.closest("[data-wdate]");
    if(wd){weekDayClick(wd.getAttribute("data-wdate"));return;}
    var et=e.target.closest(".edittask");
    if(et){editTask(et.getAttribute("data-id"));return;}
    var ep=e.target.closest(".edit-purch");
    if(ep){editPurch(ep.getAttribute("data-id"));return;}
    var en=e.target.closest(".edit-note");
    if(en){editNote(en.getAttribute("data-id"));return;}
    var rm=e.target.closest(".ph-rm");
    if(rm){fotoRm(rm.getAttribute("data-key"),rm.getAttribute("data-pid"));return;}
    var gal=e.target.closest("[data-gal]");
    if(gal){fotoGal(gal.getAttribute("data-gal"));return;}
    var cam=e.target.closest("[data-cam]");
    if(cam){fotoCam(cam.getAttribute("data-cam"));return;}
  });

  // Listener de teclado para tags
  document.addEventListener("keydown",function(e){
    if(e.key!=="Enter"&&e.key!==",")return;
    var inp=e.target,ns=inp.getAttribute("data-taginp");
    if(!ns)return;
    e.preventDefault();
    var val=inp.value.trim().toLowerCase().replace(/\s+/g,"_");
    if(!val)return;
    if(ns==="tf")tfAddTag(val);
    else if(ns==="pf")pfAddTag(val);
    else if(ns==="ni")niAddTag(val);
    else if(ns.indexOf("itm_")===0){
      // Formato: itm_task_ID ou itm_purch_ID ou itm_note_ID
      var parts=ns.split("_");
      var itype=parts[1]; // task, purch, note
      var iid=parts.slice(2).join("_");
      var arr=itype==="task"?ST.tasks:itype==="purch"?ST.purchases:ST.notes;
      var item=arr.find(function(x){return x.id===iid;});
      if(item){
        if(!item.tags)item.tags=[];
        if(item.tags.indexOf(val)<0){item.tags.push(val);save();}
        // Re-renderizar apenas o wrap de tags deste item
        var wid="tw-"+itype+"-"+iid;
        var wrap=document.getElementById(wid);
        if(wrap){
          var chips=(item.tags||[]).map(function(t){
            return '<span class="tag">'+esc(t)+'<button class="tag-rm" onclick="rmItemTag(\''+itype+'\',\''+esc(iid)+'\',\''+esc(t)+'\')">&#x2715;</button></span>';
          }).join('');
          wrap.innerHTML=chips+'<input data-taginp="'+esc(ns)+'" placeholder="+ tag" autocomplete="off" style="border:none;background:transparent;outline:none;font-size:12px;min-width:60px;flex:1"/>';
          // Focar no novo input
          var newInp=wrap.querySelector("input");if(newInp)newInp.focus();
        }
      }
    }
    inp.value="";
  },true);

  tickClock();renderTabs();render();
}
function bootApp(){
  // Listener de login (sempre registrar)
  var pwdInp=document.getElementById("pwd-inp");
  if(pwdInp)pwdInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  // Sessão ativa: mostrar app e inicializar
  if(sessionStorage.getItem("ok")==="1"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    init();
  }
}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",bootApp);else bootApp();
